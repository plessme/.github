---
name: Story
description: User-facing functionality or deliverable work item
type: Story
body:
  - type: markdown
    attributes:
      value: |
        Capture the user-facing outcome, the expected result,
        and any relevant implementation context.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What should be delivered and why does it matter?
      placeholder: "As a [user type], I want [goal] so that [reason]"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this work is complete?
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: input
    id: affected-area
    attributes:
      label: Affected Area
      description: What part of the system or product is affected?
      placeholder: "API, web app, billing flow, notifications"
    validations:
      required: false

  - type: textarea
    id: technical-approach
    attributes:
      label: Technical Notes
      description: Optional implementation context, dependencies,
        or constraints
      placeholder: "Known constraints, integration points, architecture notes"
    validations:
      required: false

  - type: textarea
    id: testing-notes
    attributes:
      label: Testing Notes
      description: Optional testing guidance or scenarios to cover
      placeholder: "Important test cases, manual checks, or validation notes"
    validations:
      required: false
