---
name: Task
description: Technical implementation task without user-facing impact
type: Task
body:
  - type: markdown
    attributes:
      value: |
        Capture the technical work, the expected outcome,
        and how completion will be verified.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be done?
      placeholder: "Detailed description of the technical work required"
    validations:
      required: true

  - type: textarea
    id: technical-details
    attributes:
      label: Technical Details
      description: Implementation details, code changes,
        or technical specifications
      placeholder: "Files to modify, functions to create, APIs to call, etc."
    validations:
      required: false

  - type: input
    id: affected-area
    attributes:
      label: Affected Area
      description: What part of the system is affected?
      placeholder: "Authentication, API, CI, data model"
    validations:
      required: false

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this task is complete?
      value: |
        - [ ] Code implemented
        - [ ] Tests added
        - [ ] Tests passing
        - [ ] Code reviewed
    validations:
      required: true

  - type: textarea
    id: testing-strategy
    attributes:
      label: Testing Notes
      description: How should this be tested or validated?
      placeholder: "Unit tests, integration tests, manual testing steps"
    validations:
      required: false
