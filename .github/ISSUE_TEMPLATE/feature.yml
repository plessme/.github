name: Feature
description: Cross-cutting feature spanning multiple repositories
title: "[FEATURE] "
labels: ["type: feature", "status: planned"]
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Template
        Use this template for features that span multiple services in the plessme distributed system.

  - type: input
    id: title
    attributes:
      label: Feature Title
      description: Clear, concise title for this feature
      placeholder: "User Authentication System"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of what this feature does and why it's needed
      placeholder: "Describe the feature's purpose, scope, and business value"
    validations:
      required: true

  - type: textarea
    id: business-value
    attributes:
      label: Business Value
      description: What value does this feature deliver to users or the business?
      placeholder: "Explain the benefits and impact of this feature"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this feature is complete?
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      description: Relative complexity/time estimate for the entire feature
      options:
        - Small
        - Medium
        - Large
        - XLarge
    validations:
      required: true

  - type: input
    id: tech-stack
    attributes:
      label: Technical Stack
      description: "Technologies involved (e.g., Java/Quarkus, Go, Nuxt, PostgreSQL, Kafka)"
      placeholder: "Java/Quarkus, PostgreSQL, Kafka, Knative"
    validations:
      required: false

  - type: textarea
    id: affected-repos
    attributes:
      label: Affected Repositories
      description: Which service repositories will have implementation stories?
      placeholder: |
        - backend-service
        - golang-service
        - nuxt-webapp
        - infrastructure
    validations:
      required: false

  - type: textarea
    id: technical-notes
    attributes:
      label: Technical Notes
      description: Architecture considerations, dependencies, or technical constraints
      placeholder: "Document any technical decisions, dependencies, or architectural patterns"
    validations:
      required: false

  - type: textarea
    id: claude-context
    attributes:
      label: Claude Code Context
      description: Special instructions or context for AI-assisted implementation
      placeholder: "Specific guidance for agents: patterns to follow, constraints, or implementation preferences"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## Child Stories
        This section will be populated as Stories are created for this Feature.
