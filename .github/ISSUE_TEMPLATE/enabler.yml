name: Enabler
description: Technical enabler for infrastructure, tooling, or architecture improvements
title: "[ENABLER] "
labels: ["type: enabler", "status: planned"]
body:
  - type: markdown
    attributes:
      value: |
        ## Enabler Template
        Use this template for technical work that enables future features or improves the system's technical foundation.

  - type: input
    id: title
    attributes:
      label: Enabler Title
      description: Clear, concise title for this enabler
      placeholder: "CI/CD Pipeline Automation"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Detailed description of what this enabler does and why it's needed
      placeholder: "Describe the technical improvement, infrastructure change, or architectural enhancement"
    validations:
      required: true

  - type: textarea
    id: technical-goal
    attributes:
      label: Technical Goal
      description: What technical capability or improvement does this enabler provide?
      placeholder: "Explain the technical benefits and how this enables future work"
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How do we know this enabler is complete?
      value: |
        - [ ] Criterion 1
        - [ ] Criterion 2
        - [ ] Criterion 3
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Estimated Effort
      description: Relative complexity/time estimate for the entire enabler
      options:
        - Small
        - Medium
        - Large
        - XLarge
    validations:
      required: true

  - type: input
    id: tech-stack
    attributes:
      label: Technical Stack
      description: "Technologies involved (e.g., Kubernetes, GitHub Actions, Terraform, Knative)"
      placeholder: "Kubernetes, Knative, OpenTofu, GitHub Actions"
    validations:
      required: false

  - type: textarea
    id: affected-repos
    attributes:
      label: Affected Repositories
      description: Which service repositories will be impacted?
      placeholder: |
        - infrastructure
        - backend-service
        - all services (CI/CD changes)
    validations:
      required: false

  - type: textarea
    id: architecture-impact
    attributes:
      label: Architecture Impact
      description: How does this change the system architecture or development workflow?
      placeholder: "Document architectural decisions, ADRs, or workflow changes"
    validations:
      required: false

  - type: textarea
    id: claude-context
    attributes:
      label: Claude Code Context
      description: Special instructions or context for AI-assisted implementation
      placeholder: "Specific guidance for agents: patterns to follow, constraints, or implementation preferences"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        ## Child Stories
        This section will be populated as Stories are created for this Enabler.
